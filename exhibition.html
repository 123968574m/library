<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>展馆介绍 - 历史文化博物馆</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <div class="container header-wrap">
        <div class="logo">历史文化博物馆</div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="exhibition.html" class="active">展馆介绍</a></li>
                <li><a href="guide.html">参观指南</a></li>
                <li><a href="news.html">新闻动态</a></li>
                <li><a href="contact.html">联系我们</a></li>
                <li><a href="register.html">会员注册</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container">
    <section class="content-box">
        <h2 class="title-h2">展馆与馆藏展品</h2>
        <div class="tab-wrap">
            <ul class="tab-title">
                <li class="active">一楼 通史展厅</li>
                <li>二楼 专题展厅</li>
                <li>三楼 民俗展厅</li>
            </ul>
            <div class="tab-content">
                <div>
                    <p>通史展厅按照历史朝代顺序陈列文物，完整展现本地千年发展脉络。</p>
                    <div class="exhibit-list">
                        <div class="exhibit-item">
                            <img src="images/ex1.jpg" alt="青铜器皿">
                            <p>商周青铜器皿</p>
                        </div>
                        <div class="exhibit-item">
                            <img src="images/ex2.jpg" alt="汉代陶俑">
                            <p>汉代彩绘陶俑</p>
                        </div>
                        <div class="exhibit-item">
                            <img src="images/ex3.jpg" alt="唐代瓷器">
                            <p>唐代青瓷</p>
                        </div>
                    </div>
                </div>
                <div>
                    <p>专题展厅分为书画展、玉器展两大区域，多为传世精品。</p>
                    <div class="exhibit-list">
                        <div class="exhibit-item">
                            <img src="images/ex4.jpg" alt="古画">
                            <p>明代山水古画</p>
                        </div>
                        <div class="exhibit-item">
                            <img src="images/ex5.jpg" alt="玉佩">
                            <p>清代和田玉佩</p>
                        </div>
                    </div>
                </div>
                <div>
                    <p>民俗展厅展示本地传统服饰、农具、生活用具，还原旧时民间生活。</p>
                    <div class="exhibit-list">
                        <div class="exhibit-item">
                            <img src="images/ex6.jpg" alt="传统服饰">
                            <p>传统民俗服饰</p>
                        </div>
                        <div class="exhibit-item">
                            <img src="images/ex7.jpg" alt="老式农具">
                            <p>老式农耕农具</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer>
    <div class="container">
        <p>历史文化博物馆 版权所有 &copy; 2026  |  地址：XX市XX区文化路88号</p>
    </div>
</footer>

<script src="js/jquery-3.6.0.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>

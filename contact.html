<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>联系我们 - 历史文化博物馆</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <div class="container header-wrap">
        <div class="logo">历史文化博物馆</div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="exhibition.html">展馆介绍</a></li>
                <li><a href="guide.html">参观指南</a></li>
                <li><a href="news.html">新闻动态</a></li>
                <li><a href="contact.html" class="active">联系我们</a></li>
                <li><a href="register.html">会员注册</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container">
    <section class="content-box">
        <h2 class="title-h2">联系我们 & 在线留言</h2>
        <div class="contact-wrap">
            <div class="contact-left">
                <h3>联系方式</h3>
                <p>地址：XX市XX区文化路88号</p>
                <p>咨询电话：0XXX-12345678</p>
                <p>邮箱：museum@163.com</p>
                <p>工作时间：09:00 - 17:00</p>
                <br>
                <p>如有团队预约、合作洽谈、意见建议，可通过下方留言框提交。</p>
            </div>
            <div class="contact-right">
                <form id="msgForm">
                    <div class="form-item">
                        <label>姓名：</label>
                        <input type="text" placeholder="请输入您的姓名">
                    </div>
                    <div class="form-item">
                        <label>联系电话：</label>
                        <input type="text" placeholder="请输入联系电话">
                    </div>
                    <div class="form-item">
                        <label>留言内容：</label>
                        <textarea id="msgContent" placeholder="请输入留言内容"></textarea>
                    </div>
                    <div class="tip-text msg-tip"></div>
                    <div class="form-item">
                        <label></label>
                        <button type="submit" class="btn">提交留言</button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</main>

<footer>
    <div class="container">
        <p>历史文化博物馆 版权所有 &copy; 2026  |  地址：XX市XX区文化路88号</p>
    </div>
</footer>

<script src="js/jquery-3.6.0.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
